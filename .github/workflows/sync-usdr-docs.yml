name: Sync USDR policy docs

# Keeps the vendored USDR policy docs under .claude/usdr/ current with the
# published source at policies.usdigitalresponse.org. Runs the sync script and
# commits only when a doc actually changed.

on:
  schedule:
    # Mondays at 12:00 UTC. Policy docs change rarely, so weekly keeps noise low.
    - cron: "0 12 * * 1"
  workflow_dispatch: {}

# Only the default GITHUB_TOKEN needs write access to push the sync commit.
permissions:
  contents: write

# Don't let a scheduled run and a manual run race on the push.
concurrency:
  group: sync-usdr-docs
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Sync docs from source
        run: bash scripts/sync-usdr-docs.sh

      - name: Commit changes if any
        run: |
          if [ -z "$(git status --porcelain .claude/usdr/)" ]; then
            echo "No changes — docs are already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .claude/usdr/
          git commit -m "chore: sync USDR policy docs from policies.usdigitalresponse.org" -m "Automated weekly sync so the vendored copies under .claude/usdr/ stay current with the published source. Generated by scripts/sync-usdr-docs.sh."
          git push
